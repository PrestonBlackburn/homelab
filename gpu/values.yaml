driver:
  enabled: false

nfd:
  enabled: true

toolkit:
  enabled: true
  env:
    - name: CONTAINER_RUNTIME
      value: containerd
    # Maps the internal config & socket logic to MicroK8s equivalents
    - name: CONTAINERD_CONFIG
      value: /var/snap/microk8s/current/args/containerd-template.toml
    - name: CONTAINERD_SOCKET
      value: /var/snap/microk8s/common/run/containerd.sock
    - name: NVIDIA_DEV_ROOT
      value: /

daemonsets:
  nodeSelector:
    kubernetes.io/hostname: userver2

containerd:
  config: /var/snap/microk8s/current/args/containerd-template.toml
  socket: /var/snap/microk8s/common/run/containerd.sock
  
hostPaths:
  rootFS: /var/snap/microk8s/common
  driverInstallDir: /var/snap/microk8s/common/run/nvidia/driver

operator:
  defaultRuntime: containerd
  validator:
    repository: nvcr.io/nvidia/cloud-native
    image: gpu-operator-validator
    env:
      - name: RUN_NVIDIA_VALIDATIONS_DIR
        value: /var/snap/microk8s/common/run/nvidia/validations

devicePlugin:
  config:
    create: false  
    name: "rtx-2070"   
    default: "rtx-2070"