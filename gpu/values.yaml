driver:
  enabled: false

nfd:
  enabled: true

toolkit:
  env:
    - name: CONTAINERD_CONFIG
      value: /var/snap/microk8s/common/args/containerd-template.toml
    - name: CONTAINERD_SOCKET
      value: /var/snap/microk8s/common/run/containerd.sock
    - name: CONTAINERD_RUNTIME_CLASS
      value: nvidia
    - name: CONTAINERD_SET_AS_DEFAULT
      value: "true"

daemonsets:
  nodeSelector:
    kubernetes.io/hostname: userver2
  
operator:
  defaultRuntime: containerd
  validator:
    repository: nvcr.io/nvidia/cloud-native
    image: gpu-operator-validator

devicePlugin:
  config:
    create: false  
    name: "rtx-2070"   
    default: "rtx-2070"